org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Kotlin's incremental compiler relativizes cache paths against the
# project root, which throws ("this and base files have different
# roots") when a dependency lives on a different drive letter than the
# project (e.g. project on D:, pub-cache on C:, both normal on Windows).
# Full (non-incremental) compilation avoids that path-relativization bug.
kotlin.incremental=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
